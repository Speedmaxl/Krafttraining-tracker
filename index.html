<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Krafttraining V4.1</title>
<style>
:root{--b:#f3f4f6;--c:#fff;--t:#1f2937;--m:#6b7280;--l:#e5e7eb;--a:#2563eb;--d:#dc2626;--s:0 10px 24px #0001}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--b);color:var(--t)}.w{max-width:820px;margin:auto;padding:14px 12px 90px}.p,.card,.modalbox{background:var(--c);border:1px solid var(--l);border-radius:18px;box-shadow:var(--s);padding:14px;margin-bottom:12px}h1{font-size:1.5rem;margin:0 0 4px}.muted{color:var(--m);font-size:.9rem}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}label{display:block;color:var(--m);font-size:.82rem;font-weight:700;margin-bottom:5px}input,textarea,button{font:inherit}input,textarea{width:100%;border:1px solid var(--l);border-radius:12px;padding:11px;background:#fff}textarea{min-height:68px}.btns{display:flex;flex-wrap:wrap;gap:7px}button{border:0;border-radius:12px;padding:10px 12px;font-weight:800}.pri{background:var(--a);color:#fff}.sec{background:#eef2ff;color:#3730a3}.ghost{background:#f9fafb;border:1px solid var(--l)}.danger{background:#fef2f2;color:var(--d)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.addbtn{text-align:left;background:#f8fafc;border:1px solid var(--l)}.added{opacity:.45}.list{display:grid;gap:10px}.empty{text-align:center;padding:20px;color:var(--m);border:1px dashed #cbd5e1;border-radius:14px}.head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.title{font-weight:900}.exercise-titlebar{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.collapsebtn{flex:0 0 44px;width:44px;height:44px;padding:0;font-size:1.55rem;line-height:1;background:#f8fafc;border:1px solid var(--l);color:var(--a)}.collapsed-card{padding-bottom:14px}.sets{margin-top:10px}.set{display:grid;grid-template-columns:58px 1fr 1fr auto;gap:7px;align-items:end;margin-bottom:7px}.last{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;padding:9px;margin-top:9px;font-size:.88rem}.tri{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.cat{margin-bottom:9px}.cat>button{width:100%;display:flex;justify-content:space-between;background:#f8fafc;border:1px solid var(--l)}.catbody{display:none;padding-top:7px}.cat.open .catbody{display:block}.modal{position:fixed;inset:0;background:#0f172a88;display:none;align-items:flex-end;justify-content:center;padding:10px;z-index:9}.modal.open{display:flex}.modalbox{width:min(820px,100%);max-height:88vh;overflow:auto;margin:0;border-bottom-left-radius:0;border-bottom-right-radius:0}.calhead{display:flex;justify-content:space-between;align-items:center}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px}.dow{text-align:center;font-size:.75rem;color:var(--m);font-weight:800}.day{min-height:44px;background:#fff;border:1px solid var(--l);position:relative}.day.has{background:#eff6ff;border-color:#93c5fd}.dot{position:absolute;right:5px;bottom:5px;width:7px;height:7px;border-radius:50%;background:var(--a)}@media(max-width:600px){.row,.grid{grid-template-columns:1fr}.btns{display:grid}.head{flex-direction:column}.tri{grid-template-columns:1fr}}
</style></head><body><div class="w">
<div class="p"><h1>Krafttraining Tracker V4.1</h1><div class="muted">Bibliothek · Favoriten · freie Reihenfolge · Kalender · V3-Import</div></div>
<div class="p"><b>Aktuelle Einheit</b><div class="row" style="margin-top:9px"><div><label>Datum</label><input id="date" type="date"></div><div><label>Kommentar</label><input id="note" placeholder="z. B. gut erholt"></div></div><div class="btns" style="margin-top:9px"><button class="pri" id="save">Training speichern</button><button class="sec" id="openlib">+ Übung hinzufügen</button><button class="ghost" id="clear">Einheit leeren</button></div></div>
<div class="p"><b>⭐ Favoriten</b><div id="favs" class="grid" style="margin-top:8px"></div></div>
<div id="workout" class="list"></div>
<div class="p"><div class="calhead"><button class="ghost" id="prev">‹</button><b id="caltitle"></b><button class="ghost" id="next">›</button></div><div id="cal" class="cal"></div><div id="hist"></div></div>
<div class="p"><b>Daten & Bibliothek</b><div class="btns" style="margin-top:8px"><button class="sec" id="manage">Bibliothek verwalten</button><button class="ghost" id="iv3">V3-JSON importieren</button><button class="ghost" id="exp">V4-Backup exportieren</button><button class="ghost" id="imp">V4-Backup importieren</button><input id="f3" type="file" accept="application/json" hidden><input id="f4" type="file" accept="application/json" hidden></div></div>
</div>
<div class="modal" id="libmodal"><div class="modalbox"><div class="head"><b>Übung hinzufügen</b><button class="ghost close" data-close="libmodal">Schließen</button></div><div id="libcats" style="margin-top:10px"></div></div></div>
<div class="modal" id="manmodal"><div class="modalbox"><div class="head"><b>Bibliothek verwalten</b><button class="ghost close" data-close="manmodal">Schließen</button></div><div class="btns" style="margin:10px 0"><button class="sec" id="newlib">Neue Übung</button></div><div id="manlist"></div></div></div>
<script>
const K="krafttraining_tracker_v4";
const START=[
{id:"pullups_wide",name:"Klimmzüge breit",cat:["Rücken"],w:false,f:true},{id:"pullups_narrow",name:"Klimmzüge eng",cat:["Rücken"],w:false,f:true},{id:"landmine_wide",name:"Landmine Row breit",cat:["Rücken"],w:true,f:false},{id:"landmine_narrow",name:"Landmine Row eng",cat:["Rücken"],w:true,f:false},{id:"lat_wide",name:"Latziehen breit",cat:["Rücken"],w:true,f:true},{id:"lat_narrow",name:"Latziehen eng",cat:["Rücken"],w:true,f:false},{id:"hyper",name:"Hyperextensions",cat:["Rücken","Bauch"],w:false,f:false},{id:"db_row",name:"Rudern KH",cat:["Rücken"],w:true,f:false},{id:"deadlift",name:"Kreuzheben LH",cat:["Rücken","Beine"],w:true,f:true},
{id:"hangsit",name:"Hanging Situps",cat:["Bauch"],w:false,f:false,s:"tri"},{id:"legraise",name:"Beinheben",cat:["Bauch"],w:false,f:false,s:"tri"},{id:"plank",name:"Planks",cat:["Bauch"],w:false,f:false},
{id:"squat_free",name:"Kniebeugen frei LH",cat:["Beine"],w:true,f:true},{id:"squat_smith",name:"Kniebeugen Smith",cat:["Beine"],w:true,f:false},{id:"legext",name:"Beinstrecker",cat:["Beine"],w:true,f:false},{id:"legcurl",name:"Beinbeuger",cat:["Beine"],w:true,f:false},{id:"calf",name:"Wadenheben Smith",cat:["Beine"],w:true,f:true},
{id:"bench_b",name:"Bankdrücken LH",cat:["Brust"],w:true,f:true},{id:"bench_d",name:"Bankdrücken KH",cat:["Brust"],w:true,f:false},{id:"incl_b",name:"Schrägbankdrücken LH",cat:["Brust"],w:true,f:false},{id:"incl_d",name:"Schrägbankdrücken KH",cat:["Brust"],w:true,f:false},{id:"dips",name:"Dips",cat:["Brust","Arme"],w:false,f:true},
{id:"latraise",name:"Seitheben KH",cat:["Schultern"],w:true,f:true},{id:"shoulder_smith",name:"Schulterdrücken Smith",cat:["Schultern"],w:true,f:false},{id:"frontraise",name:"Frontheben SZ-Stange",cat:["Schultern"],w:true,f:false},
{id:"ez_free",name:"SZ-Curls frei",cat:["Arme"],w:true,f:true},{id:"ez_preacher",name:"SZ-Curls Curlpult",cat:["Arme"],w:true,f:false},{id:"db_curl",name:"Curls KH",cat:["Arme"],w:true,f:false},{id:"cable_curl",name:"Curls Kabelzug",cat:["Arme"],w:true,f:false},{id:"forearm",name:"Unterarm Curls LH",cat:["Arme"],w:true,f:false},{id:"triceps",name:"Trizepsdrücken Stange",cat:["Arme"],w:true,f:true}
];
const MAP={"Hyperextensions – Swissball":"hyper","GravityBoots – Hanging Situps":"hangsit","KH-Seitheben (up-front-side-down)":"latraise","SZ-Curls":"ez_free","Dip-Machine":"dips","Trizeps-Drücken Stange":"triceps","Unterarm-Curls LH":"forearm","Kreuzheben LH":"deadlift","Kniebeugen frei LH":"squat_free","Wadenheben Multipresse":"calf"};
const cp=x=>JSON.parse(JSON.stringify(x));const today=()=>{let d=new Date(),o=d.getTimezoneOffset();return new Date(d-o*60000).toISOString().slice(0,10)};
function normalizeTriSet(s={}){return{straightStart:String(s.straightStart??s.straight??""),left:String(s.left??""),right:String(s.right??""),straightEnd:String(s.straightEnd??"")}}
function normalizeDB(x){
  const fixExercise=e=>{
    if(e.s==="tri")e.sets=(e.sets||[]).map(normalizeTriSet);
    if(e.collapsed===undefined)e.collapsed=false;
    return e
  };
  (x.history||[]).forEach(w=>(w.ex||[]).forEach(fixExercise));
  if(!x.draft)x.draft={date:today(),note:"",ex:[]};
  (x.draft.ex||[]).forEach(fixExercise);
  return x
}
function load(){try{let x=JSON.parse(localStorage.getItem(K));if(x.library&&x.history)return normalizeDB(x)}catch{}return{library:cp(START),history:[],draft:{date:today(),note:"",ex:[]}}}
let db=load(),cursor=new Date(),sel=null;const saveDB=()=>localStorage.setItem(K,JSON.stringify(db));const byid=id=>db.library.find(x=>x.id===id);const has=id=>db.draft.ex.some(x=>x.exerciseId===id);
function last(id,before){for(const w of [...db.history].sort((a,b)=>b.date.localeCompare(a.date))){if(before&&w.date>=before)continue;let e=w.ex.find(x=>x.exerciseId===id);if(e)return e}return null}
function mk(lib){let l=last(lib.id);return{id:"s"+Date.now()+Math.random(),exerciseId:lib.id,name:lib.name,w:lib.w,s:lib.s||null,comment:"",collapsed:false,sets:l?cp(l.sets):(lib.s==="tri"?[{straightStart:"",left:"",right:"",straightEnd:""}]:[{weight:"",reps:""}])}}
function esc(x=""){return String(x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmt(e){return e.s==="tri"?e.sets.map((s,i)=>`R${i+1}: G1 ${s.straightStart??s.straight??"–"} · L ${s.left||"–"} · R ${s.right||"–"} · G2 ${s.straightEnd||"–"}`).join("<br>"):e.sets.map((s,i)=>`S${i+1}: ${e.w&&s.weight!==""?s.weight+" kg · ":""}${s.reps||"–"} Wdh.`).join("<br>")}

function renderFav(){favs.innerHTML=db.library.filter(x=>x.f).map(x=>`<button class="addbtn ${has(x.id)?"added":""}" data-add="${x.id}">+ ${esc(x.name)}</button>`).join("")}
function renderWorkout(){if(!db.draft.ex.length){workout.innerHTML='<div class="empty">Noch keine Übungen hinzugefügt.</div>';return}workout.innerHTML="";db.draft.ex.forEach((e,i)=>{let l=last(e.exerciseId,db.draft.date),lib=byid(e.exerciseId),d=document.createElement("div");d.className="card"+(e.collapsed?" collapsed-card":"");let header=`<div class="exercise-titlebar"><div><div class="title">${i+1}. ${esc(e.name)}</div><div class="muted">${esc((lib?.cat||[]).join(" · "))}</div>${lib?.note?`<div class="muted">Hinweis: ${esc(lib.note)}</div>`:""}</div><button class="collapsebtn" data-collapse="${i}" aria-label="${e.collapsed?"Übung aufklappen":"Übung einklappen"}">${e.collapsed?"+":"−"}</button></div>`;if(e.collapsed){d.innerHTML=header;workout.appendChild(d);return}d.innerHTML=`${header}<div class="btns" style="margin-top:10px"><button class="ghost" data-up="${i}">↑</button><button class="ghost" data-down="${i}">↓</button><button class="danger" data-remex="${i}">Entfernen</button></div>${l?`<div class="last"><b>Letzte Einheit</b><br>${fmt(l)}${l.comment?`<br><i>${esc(l.comment)}</i>`:""}</div>`:'<div class="last">Noch keine frühere Einheit.</div>'}<div class="sets" id="sets${i}"></div><div class="btns"><button class="ghost" data-addset="${i}">${e.s==="tri"?"Runde":"Satz"} hinzufügen</button>${l?`<button class="sec" data-copy="${i}">Letzte Einheit übernehmen</button>`:""}</div><div style="margin-top:9px"><label>Kommentar zur Übung</label><textarea data-comment="${i}">${esc(e.comment||"")}</textarea></div>`;workout.appendChild(d);renderSets(i)})}
function renderSets(i){let e=db.draft.ex[i],t=document.getElementById("sets"+i);t.innerHTML=e.s==="tri"?e.sets.map((s,j)=>`<div class="card" style="box-shadow:none"><b>Runde ${j+1}</b><div class="tri" style="margin-top:7px"><div><label>Gerade 1</label><input type="number" inputmode="numeric" value="${esc(s.straightStart??s.straight??"")}" data-field="straightStart" data-e="${i}" data-s="${j}"></div><div><label>Links</label><input type="number" inputmode="numeric" value="${esc(s.left)}" data-field="left" data-e="${i}" data-s="${j}"></div><div><label>Rechts</label><input type="number" inputmode="numeric" value="${esc(s.right)}" data-field="right" data-e="${i}" data-s="${j}"></div><div><label>Gerade 2</label><input type="number" inputmode="numeric" value="${esc(s.straightEnd||"")}" data-field="straightEnd" data-e="${i}" data-s="${j}"></div></div><button class="danger" data-remset="${i}" data-si="${j}">Runde löschen</button></div>`).join(""):e.sets.map((s,j)=>`<div class="set"><div><b>Satz ${j+1}</b></div><div><label>kg</label><input type="number" inputmode="decimal" step=".5" ${e.w?"":"disabled"} value="${esc(s.weight||"")}" data-field="weight" data-e="${i}" data-s="${j}"></div><div><label>Wdh.</label><input type="number" inputmode="numeric" value="${esc(s.reps||"")}" data-field="reps" data-e="${i}" data-s="${j}"></div><div><button class="danger" data-remset="${i}" data-si="${j}">×</button></div></div>`).join("")}
function renderLib(){let cats=[...new Set(db.library.flatMap(x=>x.cat))];libcats.innerHTML=cats.map(c=>`<div class="cat"><button data-cat="${esc(c)}"><span>${esc(c)}</span><span>⌄</span></button><div class="catbody"><div class="grid">${db.library.filter(x=>x.cat.includes(c)).map(x=>`<button class="addbtn ${has(x.id)?"added":""}" data-add="${x.id}">+ ${esc(x.name)}</button>`).join("")}</div></div></div>`).join("")}
function renderManage(){manlist.innerHTML=db.library.map((x,i)=>`<div class="card" style="box-shadow:none"><div class="row"><div><label>Name</label><input value="${esc(x.name)}" data-lname="${i}"></div><div><label>Kategorien</label><input value="${esc(x.cat.join(", "))}" data-lcat="${i}"></div></div><div class="row" style="margin-top:7px"><div><label>Dauerhafte Notiz</label><input value="${esc(x.note||"")}" data-lnote="${i}" placeholder="z. B. J-Hooks Loch 17"></div><div><label>Optionen</label><div class="btns"><button class="${x.f?"sec":"ghost"}" data-fav="${i}">${x.f?"★":"☆"} Favorit</button><button class="${x.w?"sec":"ghost"}" data-weight="${i}">${x.w?"Mit Gewicht":"Nur Wdh."}</button><button class="danger" data-del="${i}">Löschen</button></div></div></div></div>`).join("")}
function openM(id){document.getElementById(id).classList.add("open")}function closeM(id){document.getElementById(id).classList.remove("open")}
function renderCal(){let y=cursor.getFullYear(),m=cursor.getMonth(),mn=["Jänner","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];caltitle.textContent=`${mn[m]} ${y}`;let h=["Mo","Di","Mi","Do","Fr","Sa","So"].map(x=>`<div class="dow">${x}</div>`).join(""),first=new Date(y,m,1),start=(first.getDay()+6)%7,dim=new Date(y,m+1,0).getDate(),prevd=new Date(y,m,0).getDate();for(let c=0;c<42;c++){let n,mm=m,yy=y;if(c<start){n=prevd-start+c+1;mm=m-1}else if(c>=start+dim){n=c-start-dim+1;mm=m+1}else n=c-start+1;let d=new Date(yy,mm,n),iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`,hasw=db.history.some(w=>w.date===iso);h+=`<button class="day ${hasw?"has":""}" data-day="${iso}">${n}${hasw?'<span class="dot"></span>':""}</button>`}cal.innerHTML=h;renderHist()}
function renderHist(){if(!sel){hist.innerHTML="";return}let w=db.history.find(x=>x.date===sel);hist.innerHTML=w?`<div class="card" style="box-shadow:none;margin-top:10px"><b>${sel.split("-").reverse().join(".")}</b>${w.note?`<div><i>${esc(w.note)}</i></div>`:""}${w.ex.map(e=>`<div style="margin-top:6px"><b>${esc(e.name)}</b><br>${fmt(e)}</div>`).join("")}</div>`:'<div class="card" style="box-shadow:none;margin-top:10px">Kein Training an diesem Tag.</div>'}
function render(){date.value=db.draft.date;note.value=db.draft.note||"";renderFav();renderWorkout();renderLib();renderManage();renderCal()}
function add(id){if(has(id))return;let l=byid(id);if(l)db.draft.ex.push(mk(l));saveDB();render()}
function migrate(v){if(!v||!Array.isArray(v.workouts))throw Error();let conv=v.workouts.map(w=>{let ex=[];(w.exercises||[]).forEach(e=>{if(e.name==="Klimmzüge"&&e.type==="pullups_tabs"){let a=(e.tabs?.breit||[]).filter(s=>s.reps!=="").map(s=>({weight:"",reps:String(s.reps)})),b=(e.tabs?.eng||[]).filter(s=>s.reps!=="").map(s=>({weight:"",reps:String(s.reps)}));if(a.length)ex.push({exerciseId:"pullups_wide",name:"Klimmzüge breit",w:false,s:null,comment:"",sets:a});if(b.length)ex.push({exerciseId:"pullups_narrow",name:"Klimmzüge eng",w:false,s:null,comment:"",sets:b});return}let id=MAP[e.name]||"import_"+(e.id||Math.random()),lib=byid(id);if(!lib){lib={id,name:e.name||"Importierte Übung",cat:["Importiert"],w:e.type==="weighted_sets",f:false,note:""};db.library.push(lib)}if(e.type==="situps_fixed"){let sets=(e.rounds||[]).filter(r=>r.gerade!==""||r.links!==""||r.rechts!=="").map(r=>({straightStart:String(r.gerade??""),left:String(r.links??""),right:String(r.rechts??""),straightEnd:""}));if(sets.length)ex.push({exerciseId:id,name:lib.name,w:false,s:"tri",comment:"",collapsed:false,sets})}else{let sets=(e.sets||[]).filter(s=>s.reps!==""||s.weight!=="").map(s=>({weight:String(s.weight??""),reps:String(s.reps??"")}));if(sets.length)ex.push({exerciseId:id,name:lib.name,w:e.type==="weighted_sets",s:null,comment:"",sets})}});return{date:w.date,note:w.note||"",ex}});let map=new Map(db.history.map(w=>[w.date,w]));conv.forEach(w=>map.set(w.date,w));db.history=[...map.values()].sort((a,b)=>b.date.localeCompare(a.date));saveDB();return conv.length}
document.addEventListener("input",e=>{if(e.target===note){db.draft.note=e.target.value;saveDB();return}if(e.target===date){db.draft.date=e.target.value;saveDB();return}let t=e.target.dataset;if(t.field){db.draft.ex[+t.e].sets[+t.s][t.field]=e.target.value;saveDB();return}if(t.comment!==undefined){db.draft.ex[+t.comment].comment=e.target.value;saveDB();return}if(t.lname!==undefined){db.library[+t.lname].name=e.target.value;saveDB();renderFav();return}if(t.lcat!==undefined){db.library[+t.lcat].cat=e.target.value.split(",").map(x=>x.trim()).filter(Boolean);saveDB();return}if(t.lnote!==undefined){db.library[+t.lnote].note=e.target.value;saveDB()}})
document.addEventListener("click",e=>{let t=e.target.dataset;if(t.add){add(t.add);return}if(t.collapse!==undefined){let x=db.draft.ex[+t.collapse];x.collapsed=!x.collapsed;saveDB();renderWorkout();return}if(t.up!==undefined){let i=+t.up;if(i>0)[db.draft.ex[i-1],db.draft.ex[i]]=[db.draft.ex[i],db.draft.ex[i-1]];saveDB();renderWorkout();return}if(t.down!==undefined){let i=+t.down;if(i<db.draft.ex.length-1)[db.draft.ex[i+1],db.draft.ex[i]]=[db.draft.ex[i],db.draft.ex[i+1]];saveDB();renderWorkout();return}if(t.remex!==undefined){db.draft.ex.splice(+t.remex,1);saveDB();render();return}if(t.addset!==undefined){let x=db.draft.ex[+t.addset];x.sets.push(x.s==="tri"?{straightStart:"",left:"",right:"",straightEnd:""}:{weight:"",reps:""});saveDB();renderWorkout();return}if(t.remset!==undefined){let x=db.draft.ex[+t.remset],j=+t.si;if(x.sets.length===1)x.sets[0]=x.s==="tri"?{straightStart:"",left:"",right:"",straightEnd:""}:{weight:"",reps:""};else x.sets.splice(j,1);saveDB();renderWorkout();return}if(t.copy!==undefined){let x=db.draft.ex[+t.copy],l=last(x.exerciseId,db.draft.date);if(l){x.sets=cp(l.sets);x.comment=l.comment||"";saveDB();renderWorkout()}return}if(t.cat!==undefined){e.target.closest(".cat").classList.toggle("open");return}if(t.close){closeM(t.close);return}if(t.fav!==undefined){db.library[+t.fav].f=!db.library[+t.fav].f;saveDB();render();return}if(t.weight!==undefined){db.library[+t.weight].w=!db.library[+t.weight].w;saveDB();renderManage();return}if(t.del!==undefined){if(confirm("Übung löschen?")){db.library.splice(+t.del,1);saveDB();render()}return}if(t.day){sel=t.day;renderCal();return}})
openlib.onclick=()=>{renderLib();openM("libmodal")};manage.onclick=()=>{renderManage();openM("manmodal")};newlib.onclick=()=>{db.library.push({id:"custom_"+Date.now(),name:"Neue Übung",cat:["Sonstiges"],w:true,f:false,note:""});saveDB();renderManage();renderLib();renderFav()}
save.onclick=()=>{if(!db.draft.ex.length){alert("Bitte zuerst mindestens eine Übung hinzufügen.");return}let w={date:date.value,note:note.value.trim(),ex:cp(db.draft.ex)};db.history=db.history.filter(x=>x.date!==w.date);db.history.push(w);db.history.sort((a,b)=>b.date.localeCompare(a.date));db.draft={date:today(),note:"",ex:[]};saveDB();sel=w.date;render();alert("Training gespeichert.")}
clear.onclick=()=>{if(confirm("Einheit wirklich leeren?")){db.draft={date:today(),note:"",ex:[]};saveDB();render()}};prev.onclick=()=>{cursor=new Date(cursor.getFullYear(),cursor.getMonth()-1,1);renderCal()};next.onclick=()=>{cursor=new Date(cursor.getFullYear(),cursor.getMonth()+1,1);renderCal()}
iv3.onclick=()=>f3.click();f3.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>{try{let n=migrate(JSON.parse(x.target.result));render();alert(`${n} V3-Einheiten importiert.`)}catch{alert("V3-Import fehlgeschlagen.")}};r.readAsText(f);e.target.value=""}
exp.onclick=()=>{let b=new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=`krafttraining-v4-${today()}.json`;a.click();URL.revokeObjectURL(u)}
imp.onclick=()=>f4.click();f4.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>{try{let q=JSON.parse(x.target.result);if(!q.library||!q.history)throw Error();db=normalizeDB(q);saveDB();render();alert("Backup importiert.")}catch{alert("Import fehlgeschlagen.")}};r.readAsText(f);e.target.value=""}
render();
</script></body></html>
