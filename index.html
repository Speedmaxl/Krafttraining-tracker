<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Krafttraining Tracker V3.1</title>
  <style>
    :root{
      --bg:#f3f4f6; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --accent:#2563eb; --accent2:#1d4ed8; --danger:#dc2626; --ok:#059669;
      --okbg:#ecfdf5; --warn:#b45309; --warnbg:#fffbeb; --shadow:0 10px 25px rgba(0,0,0,.08); --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--text);padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:760px;margin:0 auto;padding:16px 14px 96px}
    .hero,.card,.history-item,.toolbar{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{padding:18px;margin-bottom:14px}
    h1{margin:0 0 6px;font-size:1.5rem}
    .sub,.muted-block{color:var(--muted);font-size:.92rem;line-height:1.4}
    .toolbar{padding:14px;margin-bottom:14px;display:grid;gap:12px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px;font-weight:600}
    input,button,select{font:inherit}
    input[type="date"],input[type="number"],input[type="text"],select{
      width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;background:#fff;color:var(--text)
    }
    input.compact{padding:10px 11px}
    .buttons,.quick-actions{display:flex;flex-wrap:wrap;gap:8px}
    button{border:0;border-radius:14px;padding:11px 14px;font-weight:700;cursor:pointer}
    .primary{background:var(--accent);color:#fff}
    .primary:active{background:var(--accent2)}
    .secondary{background:#eef2ff;color:#3730a3}
    .ghost{background:#f9fafb;color:var(--text);border:1px solid var(--line)}
    .danger{background:#fef2f2;color:var(--danger)}
    .exercise-list,.history{display:grid;gap:12px}
    .card{padding:14px}
    .history-item{padding:12px 14px}
    .card-head{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:10px}
    .title{font-size:1.05rem;font-weight:800;line-height:1.2;margin:0}
    .meta{color:var(--muted);font-size:.83rem;line-height:1.35}
    .last-box{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:14px;padding:10px 11px;margin-bottom:10px;font-size:.9rem}
    .progress-box{background:var(--okbg);border:1px solid #a7f3d0;border-radius:14px;padding:10px 11px;margin-bottom:10px;font-size:.9rem}
    .progress-box.warn{background:var(--warnbg);border-color:#fcd34d}
    .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
    .mini-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:10px}
    .tiny-head,.tiny{font-size:.8rem;color:var(--muted);font-weight:700}
    .set-row{display:grid;grid-template-columns:72px 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
    .set-label{font-size:.84rem;color:var(--muted);font-weight:700;padding-bottom:12px}
    .section-title{margin:18px 4px 10px;font-size:1rem;font-weight:800}
    .history-date{font-size:1rem;font-weight:800;margin-bottom:8px}
    .history-line{font-size:.92rem;margin:3px 0;line-height:1.4}
    .footer-note{margin-top:16px;color:var(--muted);font-size:.85rem;line-height:1.45;text-align:center}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:.75rem;font-weight:800;margin-top:4px}
    .segmented{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .segmented button{flex:1;min-width:84px;padding:10px 12px;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px}
    .segmented button.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}
    .quick-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px;align-items:center}
    @media (max-width:560px){
      .row{grid-template-columns:1fr}
      .set-row{grid-template-columns:58px 1fr 1fr auto}
      button{width:100%}
      .buttons{display:grid}
      .card-head{flex-direction:column}
      .mini-grid{grid-template-columns:1fr}
      .quick-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Krafttraining Tracker V3.1</h1>
    <div class="sub">Volle Version mit Datenübernahme aus V2/V3, Tastatur-Fix und freien Zusatzübungen.</div>
    <div class="pill">Tipp: In Safari teilen → „Zum Home-Bildschirm“</div>
  </div>

  <div class="toolbar">
    <div class="row">
      <div><label for="workoutDate">Datum</label><input id="workoutDate" type="date" /></div>
      <div><label for="sessionNote">Einheitsnotiz</label><input id="sessionNote" type="text" placeholder="z. B. müde / stark / kurze Pausen" /></div>
    </div>
    <div class="buttons">
      <button class="primary" id="saveWorkoutBtn">Training speichern</button>
      <button class="secondary" id="copyWholeLastBtn">Ganze letzte Einheit übernehmen</button>
      <button class="secondary" id="addCustomExerciseBtn">Neue Übung hinzufügen</button>
      <button class="secondary" id="resetWorkoutBtn">Heutige Eingaben leeren</button>
      <button class="ghost" id="exportJsonBtn">JSON exportieren</button>
      <button class="ghost" id="exportCsvBtn">CSV exportieren</button>
      <button class="ghost" id="importBtn">JSON importieren</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </div>

  <div class="exercise-list" id="exerciseList"></div>

  <div class="section-title">Verlauf</div>
  <div class="history" id="history"></div>

  <div class="footer-note">Alle Daten bleiben lokal auf diesem Gerät bzw. in diesem Browser, solange Sie sie nicht exportieren oder löschen.</div>
</div>

<script>
const STORAGE_KEY = "krafttraining_tracker_v3_1";
const LEGACY_KEYS = ["krafttraining_tracker_v3","krafttraining_tracker_v2","krafttraining_tracker_v1"];

const exerciseTemplates = [
  { id:"hyperextensions", name:"Hyperextensions – Swissball", type:"simple_reps" },
  { id:"klimmzuege", name:"Klimmzüge", type:"pullups_tabs", tabs:["breit","eng"] },
  { id:"gravityboots", name:"GravityBoots – Hanging Situps", type:"situps_fixed" },
  { id:"kh_seitheben", name:"KH-Seitheben (up-front-side-down)", type:"weighted_sets" },
  { id:"sz_curls", name:"SZ-Curls", type:"weighted_sets" },
  { id:"dip_machine", name:"Dip-Machine", type:"simple_reps" },
  { id:"trizeps_druecken", name:"Trizeps-Drücken Stange", type:"weighted_sets" },
  { id:"unterarm_curls", name:"Unterarm-Curls LH", type:"weighted_sets" },
  { id:"kreuzheben", name:"Kreuzheben LH", type:"weighted_sets" },
  { id:"kniebeugen", name:"Kniebeugen frei LH", type:"weighted_sets" },
  { id:"wadenheben", name:"Wadenheben Multipresse", type:"weighted_sets" }
];

function todayISO(){
  const d = new Date(), o = d.getTimezoneOffset(), l = new Date(d.getTime() - o * 60000);
  return l.toISOString().slice(0,10);
}
function createExerciseState(t){
  if(t.type==="weighted_sets") return {id:t.id,name:t.name,type:t.type,sets:[{reps:"",weight:""}]};
  if(t.type==="simple_reps") return {id:t.id,name:t.name,type:t.type,sets:[{reps:""}]};
  if(t.type==="pullups_tabs") return {id:t.id,name:t.name,type:t.type,activeTab:t.tabs[0],tabs:{breit:[{reps:""},{reps:""}],eng:[{reps:""},{reps:""}]}};
  if(t.type==="situps_fixed") return {id:t.id,name:t.name,type:t.type,rounds:[{gerade:"",links:"",rechts:""}]};
}
function createCustomExercise(){
  return {
    id:"custom_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
    name:"",
    type:"custom_builder",
    mode:"weighted_sets",
    sets:[{reps:"",weight:""}],
    rounds:[{reps:""}]
  };
}
function createEmptyWorkout(){ return {date:todayISO(),note:"",exercises:exerciseTemplates.map(createExerciseState)}; }
function seedWorkouts(){ return {workouts:[]}; }
function normalizeDb(db){ return (!db || !Array.isArray(db.workouts)) ? seedWorkouts() : db; }

function loadDb(){
  try{
    const current = localStorage.getItem(STORAGE_KEY);
    if(current) return normalizeDb(JSON.parse(current));
    for(const key of LEGACY_KEYS){
      const raw = localStorage.getItem(key);
      if(raw){
        const parsed = normalizeDb(JSON.parse(raw));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
        return parsed;
      }
    }
  }catch(e){}
  const seeded = seedWorkouts();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
  return seeded;
}
function saveDb(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

let db = loadDb();
let currentWorkout = createEmptyWorkout();

function formatDate(s){ const [y,m,d]=s.split("-"); return `${d}.${m}.${y.slice(2)}`; }
function escapeHtml(str=""){ return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
function getSavedWorkoutsSortedDesc(){ return [...db.workouts].sort((a,b)=>b.date.localeCompare(a.date)); }

function exerciseHasData(ex){
  if(!ex) return false;
  if(ex.type==="weighted_sets"||ex.type==="simple_reps") return (ex.sets||[]).some(s=>Object.values(s).some(v=>String(v||"").trim()!==""));
  if(ex.type==="pullups_tabs") return Object.values(ex.tabs||{}).some(list=>list.some(s=>String(s.reps||"").trim()!==""));
  if(ex.type==="situps_fixed") return (ex.rounds||[]).some(r=>Object.values(r).some(v=>String(v||"").trim()!==""));
  if(ex.type==="custom_builder"){
    return ex.mode==="weighted_sets"
      ? (String(ex.name||"").trim()!=="" || (ex.sets||[]).some(s=>s.reps||s.weight))
      : (String(ex.name||"").trim()!=="" || (ex.rounds||[]).some(r=>r.reps));
  }
  return false;
}
function getLastExerciseEntry(id){
  for(const workout of getSavedWorkoutsSortedDesc()){
    const ex = workout.exercises.find(e=>e.id===id);
    if(ex && exerciseHasData(ex)) return {date:workout.date,exercise:ex};
  }
  return null;
}
function getPreviousExerciseEntryBeforeDate(id,date){
  for(const workout of getSavedWorkoutsSortedDesc().filter(w=>w.date<date)){
    const ex = workout.exercises.find(e=>e.id===id);
    if(ex && exerciseHasData(ex)) return {date:workout.date,exercise:ex};
  }
  return null;
}
function summarizeExercise(ex){
  if(!ex) return "–";
  if(ex.type==="weighted_sets") return (ex.sets||[]).filter(s=>s.reps||s.weight).map((s,i)=>`Satz ${i+1}: ${s.weight?s.weight+" kg · ":""}${s.reps?s.reps+" Wdh.":""}`).join("<br>") || "–";
  if(ex.type==="simple_reps") return (ex.sets||[]).filter(s=>s.reps).map((s,i)=>`Satz ${i+1}: ${s.reps} Wdh.`).join("<br>") || "–";
  if(ex.type==="pullups_tabs"){ const b=(ex.tabs?.breit||[]).map(s=>s.reps).filter(Boolean).join(" / "); const e=(ex.tabs?.eng||[]).map(s=>s.reps).filter(Boolean).join(" / "); return `Breit: ${b||"–"}<br>Eng: ${e||"–"}`; }
  if(ex.type==="situps_fixed") return (ex.rounds||[]).map((r,i)=>`Runde ${i+1}: G ${r.gerade||"–"} · L ${r.links||"–"} · R ${r.rechts||"–"}`).join("<br>") || "–";
  if(ex.type==="custom_builder"){
    return ex.mode==="weighted_sets"
      ? ((ex.sets||[]).filter(s=>s.reps||s.weight).map((s,i)=>`Satz ${i+1}: ${s.weight?s.weight+" kg · ":""}${s.reps?s.reps+" Wdh.":""}`).join("<br>") || "–")
      : ((ex.rounds||[]).filter(r=>r.reps).map((r,i)=>`Satz ${i+1}: ${r.reps} Wdh.`).join("<br>") || "–");
  }
  return "–";
}
function calcProgress(current, previous){
  if(!current || !previous) return null;
  const curType = current.type==="custom_builder" ? current.mode : current.type;
  const prevType = previous.type==="custom_builder" ? previous.mode : previous.type;

  if(curType==="weighted_sets" && prevType==="weighted_sets"){
    const curSets = current.sets || [], prevSets = previous.sets || [];
    const curV = curSets.reduce((sum,s)=>sum+(Number(s.weight||0)*Number(s.reps||0)),0);
    const prevV = prevSets.reduce((sum,s)=>sum+(Number(s.weight||0)*Number(s.reps||0)),0);
    const curW = Math.max(0,...curSets.map(s=>Number(s.weight||0)));
    const prevW = Math.max(0,...prevSets.map(s=>Number(s.weight||0)));
    const curR = curSets.reduce((sum,s)=>sum+Number(s.reps||0),0);
    const prevR = prevSets.reduce((sum,s)=>sum+Number(s.reps||0),0);
    return {type:"weighted_sets",volumeDelta:Math.round((curV-prevV)*10)/10,bestWeightDelta:Math.round((curW-prevW)*10)/10,repsDelta:curR-prevR};
  }
  if(curType==="simple_reps" && prevType==="simple_reps"){
    const cur = (current.rounds?.length ? current.rounds : current.sets || []).reduce((sum,s)=>sum+Number(s.reps||0),0);
    const prev = (previous.rounds?.length ? previous.rounds : previous.sets || []).reduce((sum,s)=>sum+Number(s.reps||0),0);
    return {type:"simple_reps",repsDelta:cur-prev};
  }
  if(current.type==="pullups_tabs" && previous.type==="pullups_tabs"){
    const cb=(current.tabs?.breit||[]).reduce((sum,s)=>sum+Number(s.reps||0),0);
    const pb=(previous.tabs?.breit||[]).reduce((sum,s)=>sum+Number(s.reps||0),0);
    const ce=(current.tabs?.eng||[]).reduce((sum,s)=>sum+Number(s.reps||0),0);
    const pe=(previous.tabs?.eng||[]).reduce((sum,s)=>sum+Number(s.reps||0),0);
    return {type:"pullups_tabs",breitDelta:cb-pb,engDelta:ce-pe};
  }
  if(current.type==="situps_fixed" && previous.type==="situps_fixed"){
    const sumField=(rounds,key)=>(rounds||[]).reduce((sum,r)=>sum+Number(r[key]||0),0);
    return {
      type:"situps_fixed",
      geradeDelta:sumField(current.rounds,"gerade")-sumField(previous.rounds,"gerade"),
      linksDelta:sumField(current.rounds,"links")-sumField(previous.rounds,"links"),
      rechtsDelta:sumField(current.rounds,"rechts")-sumField(previous.rounds,"rechts")
    };
  }
  return null;
}
function progressHtml(p){
  if(!p) return "";
  const parts=[]; let positive=false; const fmt=n=>(n>0?`+${n}`:String(n));
  if(p.type==="weighted_sets"){
    if(p.bestWeightDelta){ parts.push(`${fmt(p.bestWeightDelta)} kg Topgewicht`); positive = positive || p.bestWeightDelta>0; }
    if(p.repsDelta){ parts.push(`${fmt(p.repsDelta)} Wdh. gesamt`); positive = positive || p.repsDelta>0; }
    if(p.volumeDelta){ parts.push(`${fmt(p.volumeDelta)} Volumen`); positive = positive || p.volumeDelta>0; }
  }
  if(p.type==="simple_reps" && p.repsDelta){ parts.push(`${fmt(p.repsDelta)} Wdh. gesamt`); positive = positive || p.repsDelta>0; }
  if(p.type==="pullups_tabs"){
    if(p.breitDelta){ parts.push(`Breit ${fmt(p.breitDelta)} Wdh.`); positive = positive || p.breitDelta>0; }
    if(p.engDelta){ parts.push(`Eng ${fmt(p.engDelta)} Wdh.`); positive = positive || p.engDelta>0; }
  }
  if(p.type==="situps_fixed"){
    if(p.geradeDelta){ parts.push(`Gerade ${fmt(p.geradeDelta)}`); positive = positive || p.geradeDelta>0; }
    if(p.linksDelta){ parts.push(`Links ${fmt(p.linksDelta)}`); positive = positive || p.linksDelta>0; }
    if(p.rechtsDelta){ parts.push(`Rechts ${fmt(p.rechtsDelta)}`); positive = positive || p.rechtsDelta>0; }
  }
  if(!parts.length) return '<div class="progress-box warn">Kein Unterschied zur letzten Einheit.</div>';
  return `<div class="progress-box ${positive ? "" : "warn"}"><strong>Progress:</strong> ${parts.join(" · ")}</div>`;
}

function renderWeightedSets(exIndex, exercise){
  return `<div class="quick-row"><div class="muted-block">Gewicht und Wiederholungen wie bisher, aber ohne Keyboard-Abbruch.</div><div class="quick-actions"><button class="ghost" data-action="addSet" data-index="${exIndex}">Satz hinzufügen</button></div></div>${
    (exercise.sets||[]).map((set,setIndex)=>`
      <div class="set-row">
        <div class="set-label">Satz ${setIndex+1}</div>
        <div><label>kg</label><input class="compact" type="number" inputmode="decimal" step="0.5" value="${escapeHtml(set.weight)}" data-field="weight" data-ex="${exIndex}" data-set="${setIndex}" data-kind="weighted_sets" placeholder="27.5" /></div>
        <div><label>Wdh.</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(set.reps)}" data-field="reps" data-ex="${exIndex}" data-set="${setIndex}" data-kind="weighted_sets" placeholder="10" /></div>
        <div><button class="danger" data-action="removeSet" data-ex="${exIndex}" data-set="${setIndex}">×</button></div>
      </div>`).join("")
  }`;
}
function renderSimpleReps(exIndex, exercise){
  return `<div class="quick-row"><div class="muted-block">Nur Wiederholungen.</div><div class="quick-actions"><button class="ghost" data-action="addSet" data-index="${exIndex}">Satz hinzufügen</button></div></div>${
    (exercise.sets||[]).map((set,setIndex)=>`
      <div class="set-row">
        <div class="set-label">Satz ${setIndex+1}</div>
        <div><label>Wdh.</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(set.reps)}" data-field="reps" data-ex="${exIndex}" data-set="${setIndex}" data-kind="simple_reps" placeholder="10" /></div>
        <div></div>
        <div><button class="danger" data-action="removeSet" data-ex="${exIndex}" data-set="${setIndex}">×</button></div>
      </div>`).join("")
  }`;
}
function renderPullups(exIndex, exercise){
  const activeTab = exercise.activeTab || "breit";
  return `<div class="segmented">${
      ["breit","eng"].map(tab=>`<button class="${activeTab===tab ? "active" : ""}" data-action="switchTab" data-ex="${exIndex}" data-tab="${tab}">${tab}</button>`).join("")
    }</div>
    <div class="muted-block">Breit und eng getrennt.</div>
    <div class="buttons" style="margin:8px 0 10px;"><button class="ghost" data-action="addPullupSet" data-index="${exIndex}" data-tab="${activeTab}">Satz bei ${activeTab} hinzufügen</button></div>${
      (exercise.tabs[activeTab]||[]).map((set,setIndex)=>`
        <div class="set-row">
          <div class="set-label">Satz ${setIndex+1}</div>
          <div><label>Wdh.</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(set.reps)}" data-field="reps" data-ex="${exIndex}" data-set="${setIndex}" data-tab="${activeTab}" data-kind="pullups_tabs" placeholder="10" /></div>
          <div></div>
          <div><button class="danger" data-action="removePullupSet" data-ex="${exIndex}" data-set="${setIndex}" data-tab="${activeTab}">×</button></div>
        </div>`).join("")
    }`;
}
function renderSitups(exIndex, exercise){
  return `<div class="muted-block">Fixe Felder für gerade / links / rechts.</div>
    <div class="buttons" style="margin:8px 0 10px;"><button class="ghost" data-action="addRound" data-index="${exIndex}">Runde hinzufügen</button></div>${
      (exercise.rounds||[]).map((round,roundIndex)=>`
        <div class="mini-card">
          <div class="tiny-head">Runde ${roundIndex+1}</div>
          <div class="mini-grid">
            <div><label>Gerade</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(round.gerade)}" data-field="gerade" data-ex="${exIndex}" data-round="${roundIndex}" data-kind="situps_fixed" placeholder="15" /></div>
            <div><label>Links</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(round.links)}" data-field="links" data-ex="${exIndex}" data-round="${roundIndex}" data-kind="situps_fixed" placeholder="12" /></div>
            <div><label>Rechts</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(round.rechts)}" data-field="rechts" data-ex="${exIndex}" data-round="${roundIndex}" data-kind="situps_fixed" placeholder="12" /></div>
          </div>
          <button class="danger" data-action="removeRound" data-ex="${exIndex}" data-round="${roundIndex}">Runde löschen</button>
        </div>`).join("")
    }`;
}
function renderCustomBuilder(exIndex, exercise){
  const nameField = `<div style="margin-bottom:10px;"><label>Name / Beschreibung der Übung</label><input class="compact" type="text" value="${escapeHtml(exercise.name||"")}" data-kind="custom_name" data-ex="${exIndex}" placeholder="z. B. Rudern Kabelzug" /></div>`;
  const modeButtons = `<div class="segmented">
      <button class="${exercise.mode==="weighted_sets" ? "active" : ""}" data-action="setCustomMode" data-index="${exIndex}" data-mode="weighted_sets">Gewicht + Wdh.</button>
      <button class="${exercise.mode==="simple_reps" ? "active" : ""}" data-action="setCustomMode" data-index="${exIndex}" data-mode="simple_reps">Nur Wdh.</button>
    </div>`;
  if(exercise.mode==="weighted_sets"){
    return `${nameField}${modeButtons}<div class="buttons" style="margin-bottom:10px;"><button class="ghost" data-action="addCustomSet" data-index="${exIndex}">Satz hinzufügen</button></div>${
      (exercise.sets||[]).map((set,setIndex)=>`
        <div class="set-row">
          <div class="set-label">Satz ${setIndex+1}</div>
          <div><label>kg</label><input class="compact" type="number" inputmode="decimal" step="0.5" value="${escapeHtml(set.weight)}" data-field="weight" data-ex="${exIndex}" data-set="${setIndex}" data-kind="custom_weighted" placeholder="27.5" /></div>
          <div><label>Wdh.</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(set.reps)}" data-field="reps" data-ex="${exIndex}" data-set="${setIndex}" data-kind="custom_weighted" placeholder="10" /></div>
          <div><button class="danger" data-action="removeCustomSet" data-ex="${exIndex}" data-set="${setIndex}">×</button></div>
        </div>`).join("")
    }`;
  }
  return `${nameField}${modeButtons}<div class="buttons" style="margin-bottom:10px;"><button class="ghost" data-action="addCustomRound" data-index="${exIndex}">Satz hinzufügen</button></div>${
    (exercise.rounds||[]).map((round,roundIndex)=>`
      <div class="set-row">
        <div class="set-label">Satz ${roundIndex+1}</div>
        <div><label>Wdh.</label><input class="compact" type="number" inputmode="numeric" step="1" value="${escapeHtml(round.reps)}" data-field="reps" data-ex="${exIndex}" data-round="${roundIndex}" data-kind="custom_simple" placeholder="12" /></div>
        <div></div>
        <div><button class="danger" data-action="removeCustomRound" data-ex="${exIndex}" data-round="${roundIndex}">×</button></div>
      </div>`).join("")
  }`;
}

function renderExerciseBody(exIndex){
  const ex=currentWorkout.exercises[exIndex], body=document.getElementById(`body-${exIndex}`);
  if(!body) return;
  if(ex.type==="weighted_sets") body.innerHTML=renderWeightedSets(exIndex,ex);
  else if(ex.type==="simple_reps") body.innerHTML=renderSimpleReps(exIndex,ex);
  else if(ex.type==="pullups_tabs") body.innerHTML=renderPullups(exIndex,ex);
  else if(ex.type==="situps_fixed") body.innerHTML=renderSitups(exIndex,ex);
  else if(ex.type==="custom_builder") body.innerHTML=renderCustomBuilder(exIndex,ex);
}
function renderExercises(){
  const list=document.getElementById("exerciseList"); list.innerHTML="";
  currentWorkout.exercises.forEach((exercise,exIndex)=>{
    const last=getLastExerciseEntry(exercise.id);
    const previous=getPreviousExerciseEntryBeforeDate(exercise.id,currentWorkout.date);
    const prog=previous?calcProgress(exercise,previous.exercise):null;
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML = `<div class="card-head">
        <div>
          <div class="title">${escapeHtml(exercise.name||"Neue Übung")}</div>
          <div class="meta">${exercise.type==="custom_builder" ? "Freie Zusatzübung." : "Schnellmodus mit möglichst wenig Tipparbeit."}</div>
        </div>
        <div class="buttons" style="min-width:180px;">
          <button class="secondary" data-action="copyLast" data-index="${exIndex}">Letzte Einheit übernehmen</button>
          ${exercise.type==="custom_builder" ? `<button class="danger" data-action="removeExercise" data-index="${exIndex}">Übung entfernen</button>` : ""}
        </div>
      </div>
      ${last ? `<div class="last-box"><strong>Letzte Einheit (${formatDate(last.date)}):</strong><br>${summarizeExercise(last.exercise)}</div>` : '<div class="last-box">Noch kein Eintrag vorhanden.</div>'}
      ${progressHtml(prog)}
      <div id="body-${exIndex}"></div>`;
    list.appendChild(card);
    renderExerciseBody(exIndex);
  });
}
function renderHistory(){
  const history=document.getElementById("history"); history.innerHTML="";
  if(!db.workouts.length){
    history.innerHTML='<div class="history-item"><div class="tiny">Noch keine gespeicherten Einheiten.</div></div>';
    return;
  }
  getSavedWorkoutsSortedDesc().forEach(workout=>{
    const div=document.createElement("div");
    div.className="history-item";
    const lines = workout.exercises.filter(exerciseHasData).map(ex=>`<div class="history-line"><strong>${escapeHtml(ex.name||"Übung")}:</strong> ${summarizeExercise(ex)}</div>`).join("");
    div.innerHTML=`<div class="history-date">${formatDate(workout.date)}</div>${workout.note ? `<div class="history-line"><em>${escapeHtml(workout.note)}</em></div>` : ""}${lines}`;
    history.appendChild(div);
  });
}

function syncWorkoutMeta(){
  currentWorkout.date=document.getElementById("workoutDate").value;
  currentWorkout.note=document.getElementById("sessionNote").value.trim();
}
function cleanExercise(ex){
  if(ex.type==="weighted_sets") return {...ex,sets:(ex.sets||[]).filter(s=>s.reps||s.weight)};
  if(ex.type==="simple_reps") return {...ex,sets:(ex.sets||[]).filter(s=>s.reps)};
  if(ex.type==="pullups_tabs") return {...ex,tabs:{breit:(ex.tabs.breit||[]).filter(s=>s.reps),eng:(ex.tabs.eng||[]).filter(s=>s.reps)}};
  if(ex.type==="situps_fixed") return {...ex,rounds:(ex.rounds||[]).filter(r=>r.gerade||r.links||r.rechts)};
  if(ex.type==="custom_builder"){
    return ex.mode==="weighted_sets"
      ? {...ex,sets:(ex.sets||[]).filter(s=>s.reps||s.weight)}
      : {...ex,rounds:(ex.rounds||[]).filter(r=>r.reps)};
  }
  return ex;
}
function saveWorkout(){
  syncWorkoutMeta();
  const cleaned=currentWorkout.exercises.map(cleanExercise);
  if(!cleaned.some(exerciseHasData)){ alert("Bitte zuerst mindestens einen Satz eintragen."); return; }
  const workout={date:currentWorkout.date,note:currentWorkout.note,exercises:cleaned};
  db.workouts=db.workouts.filter(w=>w.date!==workout.date);
  db.workouts.push(workout);
  db.workouts.sort((a,b)=>b.date.localeCompare(a.date));
  saveDb();
  renderHistory();
  renderExercises();
  alert("Training gespeichert.");
}

function addSet(i){ const ex=currentWorkout.exercises[i]; if(ex.type==="weighted_sets") ex.sets.push({reps:"",weight:""}); else ex.sets.push({reps:""}); renderExerciseBody(i); }
function removeSet(i,s){ const ex=currentWorkout.exercises[i]; if(ex.sets.length===1) ex.sets[0]=ex.type==="weighted_sets"?{reps:"",weight:""}:{reps:""}; else ex.sets.splice(s,1); renderExercises(); }
function addPullupSet(i,tab){ currentWorkout.exercises[i].tabs[tab].push({reps:""}); renderExercises(); }
function removePullupSet(i,tab,s){ const arr=currentWorkout.exercises[i].tabs[tab]; if(arr.length===1) arr[0]={reps:""}; else arr.splice(s,1); renderExercises(); }
function addRound(i){ currentWorkout.exercises[i].rounds.push({gerade:"",links:"",rechts:""}); renderExercises(); }
function removeRound(i,r){ const arr=currentWorkout.exercises[i].rounds; if(arr.length===1) arr[0]={gerade:"",links:"",rechts:""}; else arr.splice(r,1); renderExercises(); }
function copyLast(i){
  const ex=currentWorkout.exercises[i], last=getLastExerciseEntry(ex.id);
  if(!last){ alert("Für diese Übung gibt es noch keine frühere Einheit."); return; }
  currentWorkout.exercises[i]=JSON.parse(JSON.stringify({...last.exercise,activeTab:ex.activeTab||"breit"}));
  renderExercises();
}
function copyWholeLastWorkout(){
  const lastWorkout=getSavedWorkoutsSortedDesc()[0];
  if(!lastWorkout){ alert("Noch keine frühere Einheit vorhanden."); return; }
  currentWorkout.exercises=lastWorkout.exercises.map(ex=>JSON.parse(JSON.stringify(ex)));
  renderExercises();
}
function resetWorkout(){
  if(!confirm("Heutige Eingaben wirklich leeren?")) return;
  currentWorkout=createEmptyWorkout();
  document.getElementById("workoutDate").value=currentWorkout.date;
  document.getElementById("sessionNote").value="";
  renderExercises();
}
function addCustomExercise(){ currentWorkout.exercises.push(createCustomExercise()); renderExercises(); }
function removeExercise(i){ currentWorkout.exercises.splice(i,1); renderExercises(); }
function setCustomMode(i,mode){ currentWorkout.exercises[i].mode=mode; renderExercises(); }
function addCustomSet(i){ currentWorkout.exercises[i].sets.push({reps:"",weight:""}); renderExercises(); }
function removeCustomSet(i,s){ const ex=currentWorkout.exercises[i]; if(ex.sets.length===1) ex.sets[0]={reps:"",weight:""}; else ex.sets.splice(s,1); renderExercises(); }
function addCustomRound(i){ currentWorkout.exercises[i].rounds.push({reps:""}); renderExercises(); }
function removeCustomRound(i,r){ const ex=currentWorkout.exercises[i]; if(ex.rounds.length===1) ex.rounds[0]={reps:""}; else ex.rounds.splice(r,1); renderExercises(); }

function exportJson(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  downloadBlob(blob,`krafttraining-backup-${todayISO()}.json`);
}
function exportCsv(){
  const rows=[["Datum","Einheitsnotiz","Übung","Bereich","Satz_Runde","Gewicht_kg","Wiederholungen"]];
  db.workouts.sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>{
    w.exercises.forEach(ex=>{
      if(ex.type==="weighted_sets"){
        ex.sets.forEach((s,i)=>rows.push([w.date,w.note||"",ex.name||"","",String(i+1),s.weight||"",s.reps||""]));
      }
      if(ex.type==="simple_reps"){
        ex.sets.forEach((s,i)=>rows.push([w.date,w.note||"",ex.name||"","",String(i+1),"",s.reps||""]));
      }
      if(ex.type==="pullups_tabs"){
        ["breit","eng"].forEach(tab=>(ex.tabs?.[tab]||[]).forEach((s,i)=>rows.push([w.date,w.note||"",ex.name||"",tab,String(i+1),"",s.reps||""])));
      }
      if(ex.type==="situps_fixed"){
        ex.rounds.forEach((r,i)=>{
          rows.push([w.date,w.note||"",ex.name||"","gerade",String(i+1),"",r.gerade||""]);
          rows.push([w.date,w.note||"",ex.name||"","links",String(i+1),"",r.links||""]);
          rows.push([w.date,w.note||"",ex.name||"","rechts",String(i+1),"",r.rechts||""]);
        });
      }
      if(ex.type==="custom_builder"){
        if(ex.mode==="weighted_sets"){
          ex.sets.forEach((s,i)=>rows.push([w.date,w.note||"",ex.name||"","",String(i+1),s.weight||"",s.reps||""]));
        } else {
          ex.rounds.forEach((r,i)=>rows.push([w.date,w.note||"",ex.name||"","",String(i+1),"",r.reps||""]));
        }
      }
    });
  });
  const csv=rows.map(r=>r.map(csvEscape).join(";")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  downloadBlob(blob,`krafttraining-export-${todayISO()}.csv`);
}
function csvEscape(v){ v=String(v??""); return /[";\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; }
function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function importJson(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!imported||!Array.isArray(imported.workouts)) throw new Error();
      db=imported;
      saveDb();
      renderHistory();
      renderExercises();
      alert("Import erfolgreich.");
    }catch(err){
      alert("Import fehlgeschlagen. Bitte eine gültige JSON-Datei verwenden.");
    }
  };
  r.readAsText(file);
}

// Important: no full rerender on normal input, so keyboard stays open on iPhone.
document.addEventListener("input", e=>{
  const kind=e.target.dataset.kind;
  if(!kind) return;
  const ex=Number(e.target.dataset.ex), field=e.target.dataset.field, value=e.target.value;
  const cur=currentWorkout.exercises[ex];

  if(kind==="weighted_sets" || kind==="simple_reps"){
    cur.sets[Number(e.target.dataset.set)][field]=value;
    return;
  }
  if(kind==="pullups_tabs"){
    cur.tabs[e.target.dataset.tab][Number(e.target.dataset.set)][field]=value;
    return;
  }
  if(kind==="situps_fixed"){
    cur.rounds[Number(e.target.dataset.round)][field]=value;
    return;
  }
  if(kind==="custom_name"){
    cur.name=value;
    const title=e.target.closest('.card')?.querySelector('.title');
    if(title) title.textContent=value || 'Neue Übung';
    return;
  }
  if(kind==="custom_weighted"){
    cur.sets[Number(e.target.dataset.set)][field]=value;
    return;
  }
  if(kind==="custom_simple"){
    cur.rounds[Number(e.target.dataset.round)][field]=value;
    return;
  }
});

document.addEventListener("click", e=>{
  const a=e.target.dataset.action;
  if(!a) return;
  if(a==="addSet") addSet(Number(e.target.dataset.index));
  if(a==="removeSet") removeSet(Number(e.target.dataset.ex), Number(e.target.dataset.set));
  if(a==="copyLast") copyLast(Number(e.target.dataset.index));
  if(a==="switchTab"){ currentWorkout.exercises[Number(e.target.dataset.ex)].activeTab=e.target.dataset.tab; renderExercises(); }
  if(a==="addPullupSet") addPullupSet(Number(e.target.dataset.index), e.target.dataset.tab);
  if(a==="removePullupSet") removePullupSet(Number(e.target.dataset.ex), e.target.dataset.tab, Number(e.target.dataset.set));
  if(a==="addRound") addRound(Number(e.target.dataset.index));
  if(a==="removeRound") removeRound(Number(e.target.dataset.ex), Number(e.target.dataset.round));
  if(a==="removeExercise") removeExercise(Number(e.target.dataset.index));
  if(a==="setCustomMode") setCustomMode(Number(e.target.dataset.index), e.target.dataset.mode);
  if(a==="addCustomSet") addCustomSet(Number(e.target.dataset.index));
  if(a==="removeCustomSet") removeCustomSet(Number(e.target.dataset.ex), Number(e.target.dataset.set));
  if(a==="addCustomRound") addCustomRound(Number(e.target.dataset.index));
  if(a==="removeCustomRound") removeCustomRound(Number(e.target.dataset.ex), Number(e.target.dataset.round));
});

document.getElementById("saveWorkoutBtn").addEventListener("click", saveWorkout);
document.getElementById("copyWholeLastBtn").addEventListener("click", copyWholeLastWorkout);
document.getElementById("addCustomExerciseBtn").addEventListener("click", addCustomExercise);
document.getElementById("resetWorkoutBtn").addEventListener("click", resetWorkout);
document.getElementById("exportJsonBtn").addEventListener("click", exportJson);
document.getElementById("exportCsvBtn").addEventListener("click", exportCsv);
document.getElementById("importBtn").addEventListener("click", ()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e=>{ const f=e.target.files[0]; if(f) importJson(f); e.target.value=""; });
document.getElementById("workoutDate").value=currentWorkout.date;
document.getElementById("sessionNote").value=currentWorkout.note;
renderExercises();
renderHistory();
saveDb();
</script>
</body>
</html>
