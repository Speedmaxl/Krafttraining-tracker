<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krafttraining Tracker V3</title>
<style>
body { font-family: -apple-system, sans-serif; background:#f3f4f6; padding:15px; }
.card { background:white; padding:12px; border-radius:12px; margin-bottom:10px; }
button { padding:10px; border-radius:10px; border:none; margin:5px 0; }
.primary { background:#2563eb; color:white; }
.secondary { background:#e0e7ff; }
input { padding:8px; width:100%; margin:4px 0; border-radius:8px; border:1px solid #ccc;}
</style>
</head>
<body>

<h2>Krafttraining</h2>

<button class="primary" onclick="addExercise()">+ Neue Übung</button>

<div id="app"></div>

<script>

let workout = [
  {name:"Klimmzüge", sets:[{reps:"10"},{reps:"10"}]}
];

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  workout.forEach((ex, i)=>{
    let html = `<div class="card">
      <input value="${ex.name}" onchange="updateName(${i}, this.value)" placeholder="Übung"/>
    `;

    ex.sets.forEach((s, si)=>{
      html += `
        <input value="${s.reps}" 
          oninput="updateReps(${i},${si},this.value)" 
          placeholder="Wdh." />
      `;
    });

    html += `
      <button class="secondary" onclick="addSet(${i})">+ Satz</button>
    </div>`;

    app.innerHTML += html;
  });
}

function updateName(i, val){
  workout[i].name = val;
}

function updateReps(i, si, val){
  workout[i].sets[si].reps = val;
}

function addSet(i){
  workout[i].sets.push({reps:""});
  render();
}

function addExercise(){
  workout.push({name:"Neue Übung", sets:[{reps:""}]});
  render();
}

render();

</script>

</body>
</html>
